# yaml-language-server: $schema=config.schema.yaml
command_alias_start_index: 200
keybindings:
  prefix_table: Space
title:
  style: align=centre,bold
  prefix: tmux
  prefix_style: fg=green,align=centre,bold
position:
  x: R
  y: P
custom_variables:
  - name: log_info
    value: "#[fg=green,italics] [info]#[default]#[italics]"
macros:
  - name: reload-config
    commands:
      - display "#{log_info} Loading config..."
      - source-file $HOME/.config/tmux/tmux.conf
      - display -p "Config reloaded"
  - name: restart-pane
    commands:
      - display "#{log_info} Restarting pane"
      - "respawnp -k -c #{pane_current_path}"
items:
  - name: Run command
    key: space
    command: command-prompt
  - name: Last window
    key: tab
    command: last-window
  - name: Last pane
    key: "`"
    command: last-pane
  - name: Copy mode
    key: v
    command: copy-mode
  - name: Reload config
    key: r
    macro: reload-config
  - name: New session
    key: n
    command: command-prompt "new-session -s '%%'"
  - name: Zoom pane
    key: m
    command: resizep -Z
  - separator: true
  - name: Split vertical
    key: "-"
    command: "splitw -v -c #{pane_current_path}"
  - name: Split horizontal
    key: "|"
    command: "splitw -h -c #{pane_current_path}"
  - separator: true
  - name: Resize left
    key: h
    command: resizep -L 5
    transient: true
  - name: Resize down
    key: j
    command: resizep -D 5
    transient: true
  - name: Resize up
    key: k
    command: resizep -U 5
    transient: true
  - name: Resize right
    key: l
    command: resizep -R 5
    transient: true
  - separator: true
  - name: +Windows
    key: w
    menu:
      - name: Last
        key: tab
        command: last-window
      - name: Choose
        key: w
        command: choose-tree -Zw
      - name: Previous  [C-d]
        key: p
        command: previous-window
      - name: Next  [C-u]
        key: n
        command: next-window
      - name: New
        key: c
        command: "neww -c #{pane_current_path}"
      - separator: true
      - name: +Layout
        key: l
        menu:
          - name: Next
            key: l
            command: nextl
            transient: true
          - name: Tiled
            key: t
            command: selectnl tiled
          - name: Even horizontal
            key: h
            command: selectl even-horizontal
          - name: Even vertical
            key: v
            command: selectl even-vertical
          - name: Main horizontal
            key: H
            command: selectl main-horizontal
          - name: Main vertical
            key: V
            command: selectl main-vertical
      - separator: true
      - name: Rename
        key: R
        command: command-prompt -I "#W" "renamew -- \"%%\""
      - name: Kill
        key: X
        command: 'confirm -p "Kill window #W? (y/n)" killw'
  - name: +Panes
    key: p
    menu:
      - name: Last
        key: tab
        command: lastp
      - name: Choose
        key: p
        command: displayp -d 0
      - separator: true
      - name: Zoom
        key: z
        command: resizep -Z
      - name: +Resize
        key: r
        menu:
          - name: Left
            key: h
            command: resizep -L 5
            transient: true
          - name: Down
            key: j
            command: resizep -D 5
            transient: true
          - name: Up
            key: k
            command: resizep -U 5
            transient: true
          - name: Right
            key: l
            command: resizep -R 5
            transient: true
          - name: Left big
            key: H
            command: resizep -L 10
            transient: true
          - name: Down big
            key: J
            command: resizep -D 10
            transient: true
          - name: Up big
            key: K
            command: resizep -U 10
            transient: true
          - name: Right big
            key: L
            command: resizep -R 10
            transient: true
      - separator: true
      - name: Swap left
        key: H
        command: swapp -t "{left-of}"
      - name: Swap down
        key: J
        command: swapp -t "{down-of}"
      - name: Swap up
        key: K
        command: swapp -t "{up-of}"
      - name: Swap right
        key: L
        command: swapp -t "{right-of}"
      - name: Break to window
        key: "!"
        command: break-pane
      - separator: true
      - name: Mark
        key: m
        command: selectp -m
      - name: Unmark
        key: M
        command: selectp -M
      - name: Respawn
        key: R
        macro: restart-pane
      - name: Kill
        key: X
        command: 'confirm -p "Kill pane #P? (y/n)" killp'
  - name: +Buffers
    key: b
    menu:
      - name: Choose
        key: b
        command: choose-buffer -Z
      - name: List
        key: l
        command: lsb
      - name: Paste
        key: p
        command: pasteb
  - name: +Sessions
    key: s
    menu:
      - name: Choose / SessionX
        key: s
        command: run-shell "$TMUX_PLUGIN_MANAGER_PATH/tmux-sessionx/scripts/sessionx.sh"
      - name: New
        key: N
        command: new
      - name: Rename
        key: r
        command: rename
  - name: +Client
    key: C
    menu:
      - name: Choose
        key: c
        command: choose-client -Z
      - name: Last
        key: l
        command: switchc -l
      - name: Previous
        key: p
        command: switchc -p
      - name: Next
        key: n
        command: switchc -n
      - separator: true
      - name: Refresh
        key: R
        command: refresh
      - name: +Plugins
        key: P
        menu:
          - name: Install
            key: i
            command:
              run-shell $TMUX_PLUGIN_MANAGER_PATH/tpm/bindings/install_plugins
          - name: Update
            key: u
            command:
              run-shell $TMUX_PLUGIN_MANAGER_PATH/tpm/bindings/update_plugins
          - name: Clean
            key: c
            command:
              run-shell $TMUX_PLUGIN_MANAGER_PATH/tpm/bindings/clean_plugins
      - name: Detach
        key: D
        command: detach
      - name: Suspend
        key: Z
        command: suspendc
      - separator: true
      - name: Reload config
        key: r
        macro: reload-config
      - name: Customize
        key: ","
        command: customize-mode -Z
  - separator: true
  - name: Time
    key: T
    command: clock-mode
  - name: Show messages
    key: "~"
    command: show-messages
  - name: +Keys
    key: "?"
    command: list-keys -N
